<div class="search-form">
  <h2 class="search-form__title">Compra tu pasaje de bus</h2>

  <form (ngSubmit)="onSubmit()" #f="ngForm" class="search-form__grid">
    <!-- Origin -->
    <div class="field">
      <label for="origin">Origen</label>
      <select id="origin" [(ngModel)]="originId" name="origin" required>
        <option [ngValue]="null" disabled>Selecciona ciudad</option>
        <option *ngFor="let c of originCities" [ngValue]="c.id">{{ c.name }}</option>
      </select>
    </div>

    <!-- Destination -->
    <div class="field">
      <label for="destination">Destino</label>
      <select id="destination" [(ngModel)]="destinationId" name="destination" required>
        <option [ngValue]="null" disabled>Selecciona ciudad</option>
        <option *ngFor="let c of destinationCities" [ngValue]="c.id">{{ c.name }}</option>
      </select>
    </div>

    <!-- Date -->
    <div class="field">
      <label for="date">Fecha de viaje</label>
      <input
        id="date"
        type="date"
        [(ngModel)]="departureDate"
        name="date"
        [min]="minDate"
        required
      />
    </div>

    <!-- Passengers — numeric keyboard, 44px+ touch target -->
    <div class="field">
      <label for="passengers">Pasajeros</label>
      <div class="passengers-control">
        <button type="button" class="passengers-btn"
                (click)="decPassengers()"
                [disabled]="passengers <= 1"
                aria-label="Reducir pasajeros">−</button>
        <input id="passengers"
               type="number"
               inputmode="numeric"
               [(ngModel)]="passengers"
               name="passengers"
               min="1" max="10"
               class="passengers-input"
               aria-label="Número de pasajeros"
               readonly>
        <button type="button" class="passengers-btn"
                (click)="incPassengers()"
                [disabled]="passengers >= 10"
                aria-label="Aumentar pasajeros">+</button>
      </div>
    </div>

    <button type="submit" class="btn-search" [disabled]="!originId || !destinationId || !departureDate">
      🔍 Buscar salidas
    </button>
  </form>
</div>
